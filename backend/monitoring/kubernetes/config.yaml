apiVersion: v1
kind: ConfigMap
metadata:
  name: xiaozhi-config
  namespace: xiaozhi
data:
  ENVIRONMENT: "production"
  TZ: "Asia/Ho_Chi_Minh"
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"
  REDIS_HOST: "xiaozhi-redis"
  REDIS_PORT: "6379"
  DB_HOST: "xiaozhi-db"
  DB_PORT: "5432"
  MQTT_BROKER_URL: "mqtt://xiaozhi-mqtt:1883"

---
apiVersion: v1
kind: Secret
metadata:
  name: xiaozhi-secrets
  namespace: xiaozhi
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://user:password@xiaozhi-db:5432/xiaozhi"
  redis-password: "your-redis-password-here"
  secret-key: "your-secret-key-min-32-chars-here"
  mqtt-password: "your-mqtt-password-here"

---
apiVersion: v1
kind: Namespace
metadata:
  name: xiaozhi
  labels:
    name: xiaozhi

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: xiaozhi-backend-network-policy
  namespace: xiaozhi
spec:
  podSelector:
    matchLabels:
      app: xiaozhi-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app: xiaozhi-frontend
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: xiaozhi-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: xiaozhi-redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: xiaozhi-mqtt
      ports:
        - protocol: TCP
          port: 1883