# =============================================================================
# Kubernetes Deployment - py-server-xiaozhi
# Supports: Horizontal Pod Autoscaling, Rolling Updates, Health Checks
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiaozhi-backend
  namespace: xiaozhi
  labels:
    app: xiaozhi-backend
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: xiaozhi-backend
  template:
    metadata:
      labels:
        app: xiaozhi-backend
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - xiaozhi-backend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: ghcr.io/xiaozhi-ai/py-server-xiaozhi:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: udp-audio
              containerPort: 8765
              protocol: UDP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: xiaozhi-secrets
                  key: database-url
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: xiaozhi-secrets
                  key: redis-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: xiaozhi-secrets
                  key: secret-key
          envFrom:
            - configMapRef:
                name: xiaozhi-config
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/src/app/data
              readOnly: true
            - name: tts-models
              mountPath: /data/tts-models
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: xiaozhi-config
        - name: tts-models
          persistentVolumeClaim:
            claimName: xiaozhi-tts-models
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: xiaozhi-backend

---
apiVersion: v1
kind: Service
metadata:
  name: xiaozhi-backend
  namespace: xiaozhi
  labels:
    app: xiaozhi-backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    app: xiaozhi-backend

---
apiVersion: v1
kind: Service
metadata:
  name: xiaozhi-backend-external
  namespace: xiaozhi
  labels:
    app: xiaozhi-backend
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
    - name: udp-audio
      port: 8765
      targetPort: udp-audio
      protocol: UDP
  selector:
    app: xiaozhi-backend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: xiaozhi-backend-hpa
  namespace: xiaozhi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: xiaozhi-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max