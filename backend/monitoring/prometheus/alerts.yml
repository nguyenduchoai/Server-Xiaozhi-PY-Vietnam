groups:
  - name: py-server-xiaozhi-alerts
    rules:
      # High Error Rate Alert
      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) / sum(rate(http_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      # High Response Time Alert
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API response time"
          description: "95th percentile response time is {{ $value | humanizeDuration }}"

      # Database Connection Pool Exhausted
      - alert: DatabasePoolExhausted
        expr: db_pool_size{state="overflow"} > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "Overflow connections: {{ $value }}"

      # Database Slow Queries
      - alert: DatabaseSlowQueries
        expr: histogram_quantile(0.95, sum(rate(db_query_duration_seconds_bucket[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries detected"
          description: "95th percentile query time: {{ $value | humanizeDuration }}"

      # WebSocket Connection Limit
      - alert: WebSocketConnectionLimit
        expr: ws_connections_active > 900
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket connections approaching limit"
          description: "{{ $value }} active connections"

      # Cache Hit Ratio Low
      - alert: CacheHitRatioLow
        expr: cache_hit_ratio < 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low cache hit ratio"
          description: "Cache hit ratio is {{ $value | humanizePercentage }}"

      # AI Module Latency High
      - alert: AIModuleLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(ai_module_latency_seconds_bucket[5m])) by (module)) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High AI module latency"
          description: "{{ $labels.module }} 95th percentile latency: {{ $value }}s"

      # AI Module Errors
      - alert: AIModuleErrors
        expr: sum(rate(ai_module_errors_total[5m])) by (module) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "AI module errors detected"
          description: "{{ $labels.module }} error rate: {{ $value | humanizePercentage }}"

      # Rate Limit Rejections
      - alert: HighRateLimitRejections
        expr: sum(rate(rate_limit_rejected_total[5m])) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate limit rejection rate"
          description: "{{ $value }} rejections per second"

      # Service Down
      - alert: ServiceDown
        expr: up{job="py-server-xiaozhi"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "py-server-xiaozhi has been down for more than 1 minute"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: process_memory_bytes{metric_type="rss"} > 2 * 1024 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Process memory usage is {{ humanize $value }}"

      # Health Check Failing
      - alert: HealthCheckFailing
        expr: sum(rate(health_check_total{status="unhealthy"}[5m])) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Health check failing"
          description: "Health checks failing for {{ $labels.check_type }}"

  - name: py-server-xiaozhi-recording
    rules:
      - record: job:http_requests_total:rate5m
        expr: sum(rate(http_requests_total[5m])) by (job)

      - record: job:http_request_duration_p95:rate5m
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job))