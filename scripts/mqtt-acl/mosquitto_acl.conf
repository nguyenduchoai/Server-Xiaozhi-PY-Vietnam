# Mosquitto ACL — Xiaozhi Vietnam (INT-C1 hardening)
# Usage:
#   1. Copy to /mosquitto/config/acl.conf inside container
#   2. Reference from mosquitto.conf:
#        acl_file /mosquitto/config/acl.conf
#        allow_anonymous false
#        password_file /mosquitto/config/passwd
#   3. Restart broker.

# ----------------------------------------------------------------------
# Backend service — full access
# ----------------------------------------------------------------------
user xiaozhi_backend
topic readwrite #

# ----------------------------------------------------------------------
# Devices — pattern-based ACL.
# %c expands to the connected client_id; %u expands to username.
# ----------------------------------------------------------------------

# Default device account: read its own server-bound topics, write to the
# global device-server inbox and a per-device status topic. Nothing else.
pattern read  device/%c/server
pattern read  devices/p2p/%c
pattern write device-server
pattern write devices/status/%c

# Reject everything else (mosquitto's default-deny when no match).
